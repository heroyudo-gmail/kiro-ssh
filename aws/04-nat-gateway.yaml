AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SSH Brute-Force Detection - Step 4: Temporary NAT Gateway
  Create when EC2 needs internet access, delete after done installing.

Parameters:
  ProjectName:
    Type: String
    Default: ssh-detection

Resources:
  # --- Public Subnet (required for NAT Gateway) ---
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Fn::ImportValue: !Sub ${ProjectName}-vpc-id
      CidrBlock: 10.0.100.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-subnet-temp

  # --- Internet Gateway ---
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-igw-temp

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId:
        Fn::ImportValue: !Sub ${ProjectName}-vpc-id
      InternetGatewayId: !Ref InternetGateway

  # --- Public Route Table ---
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId:
        Fn::ImportValue: !Sub ${ProjectName}-vpc-id
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-rt-temp

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # --- Elastic IP for NAT ---
  NatEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-nat-eip-temp

  # --- NAT Gateway ---
  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-nat-temp

  # --- Add NAT route to existing private route table ---
  # We need to find the private route table from stack 01
  # Using the exported subnet to add a route
  PrivateNatRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableLookup
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  # Lookup private route table by tag
  PrivateRouteTableLookup:
    Type: Custom::RouteTableLookup
    Properties:
      ServiceToken: !GetAtt LookupFunction.Arn
      VpcId:
        Fn::ImportValue: !Sub ${ProjectName}-vpc-id
      TagName: !Sub ${ProjectName}-private-rt

  LookupFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-rt-lookup
      Runtime: python3.9
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt LookupRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  ec2 = boto3.client('ec2')
                  vpc_id = event['ResourceProperties']['VpcId']
                  tag_name = event['ResourceProperties']['TagName']

                  response = ec2.describe_route_tables(
                      Filters=[
                          {'Name': 'vpc-id', 'Values': [vpc_id]},
                          {'Name': 'tag:Name', 'Values': [tag_name]}
                      ]
                  )
                  
                  if response['RouteTables']:
                      rt_id = response['RouteTables'][0]['RouteTableId']
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, rt_id)
                  else:
                      cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': 'Route table not found'})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  LookupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-rt-lookup-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EC2Describe
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeRouteTables
                Resource: '*'

Outputs:
  NatGatewayId:
    Value: !Ref NatGateway
    Description: NAT Gateway ID (delete this stack to remove NAT and stop billing)
